# AVM 监控栈 — Prometheus + Loki + Promtail + Grafana
# 独立 compose 文件，与主服务配合使用：
#   启动主服务：  docker compose up -d
#   启动监控栈：  docker compose -f monitoring/docker-compose.monitoring.yml up -d
#
# 依赖主网络 avm-demo_default（主服务启动后自动创建）
version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: avm-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - '9090:9090'
    networks:
      - default

  loki:
    image: grafana/loki:latest
    container_name: avm-loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
    ports:
      - '3100:3100'
    networks:
      - default

  promtail:
    image: grafana/promtail:latest
    container_name: avm-promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - '-config.file=/etc/promtail/promtail-config.yml'
    depends_on:
      - loki
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: avm-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
      - loki
    networks:
      - default

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    # 连接到主服务的网络，使 prometheus 能访问 backend:4000
    external:
      name: avm-demo_default
